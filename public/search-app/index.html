<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Q&A Search - StackExchange Mathematics and LaTeX</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- MathJax 3 config (must come before the library) -->
  <script>
  window.MathJax = {
    tex: {
      inlineMath:  [['$','$'], ['\\(','\\)']],
      displayMath: [['$$','$$'], ['\\[','\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script','noscript','style','textarea','pre','code'],
      processHtmlClass: 'tex2jax_process',
      ignoreHtmlClass:  'tex2jax_ignore'
    },
    startup: { typeset: false }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
  <!-- ==================== HEADER ==================== -->
  <header class="search-app-header"></header>

  <!-- ==================== MODE TOGGLE ==================== -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeText" onclick="setMode('text')">&#128269; Text Search</button>
    <button class="mode-btn" id="modeLatex" onclick="setMode('latex')">&#8721; LaTeX Search</button>
  </div>

  <!-- ==================== TEXT SEARCH ==================== -->
  <div class="search-container" id="textSearchPanel">
    <div class="search-box">
      <input id="query" type="text" placeholder="e.g.  eigenvalue of symmetric matrix" autofocus>
      <button id="searchBtn">Search</button>
    </div>
    <!-- Tag autocomplete -->
    <div class="tag-autocomplete" id="textTagAuto">
      <div class="tag-selected-chips" id="textTagChips"></div>
      <div class="tag-input-wrap">
        <input class="tag-auto-input" id="textTagInput" type="text" placeholder="Add tags for better results (integration, limits, topology)" autocomplete="off">
        <div class="tag-dropdown" id="textTagDropdown"></div>
      </div>
    </div>
  </div>

  <!-- ==================== LATEX SEARCH PANEL ==================== -->
  <div class="latex-panel" id="latexSearchPanel">
    <div class="latex-card">
      <!-- Textarea -->
      <div class="latex-input-area">
        <textarea id="latexInput" placeholder="Type LaTeX here, e.g.  \int_0^1 x^2 dx" spellcheck="false"></textarea>
      </div>

      <!-- Live preview -->
      <div class="latex-preview-bar">LIVE PREVIEW</div>
      <div class="latex-preview" id="latexPreview">
        <span class="placeholder-text">Your formula will appear here…</span>
      </div>

      <!-- Keywords + search -->
      <div class="latex-search-row">
        <input id="latexKeywords" type="text" placeholder="Optional keywords (e.g. convergence, eigenvalue)…">
        <button id="latexSearchBtn">Search</button>
      </div>

    </div>
    <!-- Tag autocomplete -->
    <div class="tag-autocomplete" id="latexTagAuto">
      <div class="tag-selected-chips" id="latexTagChips"></div>
      <div class="tag-input-wrap">
        <input class="tag-auto-input" id="latexTagInput" type="text" placeholder="Add tags for better formula matches" autocomplete="off">
        <div class="tag-dropdown" id="latexTagDropdown"></div>
      </div>
    </div>
  </div>

  <!-- ==================== FILTERS (text mode) ==================== -->
  <div class="filters" id="textFilters">
    <label for="sort">Sort by:</label>
    <select id="sort">
      <option value="relevance">Relevance</option>
      <option value="votes">Votes</option>
      <option value="creation">Newest</option>
      <option value="activity">Activity</option>
    </select>

    <label for="answered">Status:</label>
    <select id="answered">
      <option value="">All</option>
      <option value="true">Answered</option>
      <option value="false">Unanswered</option>
    </select>

    <label for="pageSize">Show:</label>
    <select id="pageSize">
      <option value="10">10</option>
      <option value="20" selected>20</option>
    </select>
  </div>

  <!-- ==================== AI PANELS (injected dynamically) ==================== -->
  <div id="aiPanelContainer"></div>

  <!-- ==================== RESULTS AREA ==================== -->
  <div id="status" class="status"></div>
  <div id="results" class="results"></div>
  <div id="pagination" class="pagination"></div>

  <!-- ==================== FOOTER ==================== -->
  <footer>
    Powered by <a href="https://api.stackexchange.com/" target="_blank">StackExchange API</a>,
    <a href="https://approach0.xyz/" target="_blank">Approach Zero</a> and
    <a href="https://math.stackexchange.com" target="_blank">Mathematics Stack Exchange</a>
  </footer>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/search-cache.js"></script>
  <script src="js/search-autocorrect.js"></script>
  <script src="js/search-enhance.js"></script>
  <script src="js/search-intelligence.js"></script>
  <script src="js/tag-selector.js"></script>
  <script src="js/latex-editor.js"></script>
  <script src="js/search-text.js"></script>
  <script src="js/latex-canonicalize.js"></script>
  <script src="js/math-similarity.js"></script>
  <script src="js/formula-tokenizer.js"></script>
  <script src="js/search-latex.js"></script>
  <script src="js/search-latex-aggressive.js"></script>

  <!-- NEW: AI & Sort modules -->
  <script src="js/ai-engine.js"></script>
  <script src="js/sort-engine.js"></script>
  <script src="js/ai-ui.js"></script>

  <script>
    /* ── Site palette ── */
    (function () {
      const t = document.querySelector('[data-theme-toggle]');
      const r = document.documentElement;
      let d = 'site';
      r.setAttribute('data-theme', d);
      if (t) {
        t.addEventListener('click', () => {
          d = 'site';
          r.setAttribute('data-theme', d);
        });
      }
    })();

    /* ── Global state for AI results ── */
    let _lastSearchResults = [];
    let _lastSearchQuery = '';
    let _currentSortKey = 'relevance';

    /* ── Bootstrap ── */
    document.addEventListener('DOMContentLoaded', () => {
      cacheDom();
      initLatexPreview();
      initTextSearch();
      initLatexSearch();
      initSearchHistory();
      initTagSelectors();

      /* Search tips toggle */
      const tipsPanel = document.getElementById('searchTips');
      const tipsToggle = document.getElementById('tipsToggle');
      if (tipsToggle && tipsPanel) {
        tipsToggle.addEventListener('click', () => {
          tipsPanel.classList.toggle('expanded');
        });
      }

      /* AI Toggle */
      AIEngine.setEnabled(false);

      /* Sort toolbar events */
      AIUI.initSortToolbar(handleSortChange);

      /* Check AI backend health */
      Promise.resolve(true).then(ok => {
        if (!ok) {
          console.warn('AI backend not available — AI features disabled');
          const toggle = document.getElementById('aiToggle');
          if (toggle) {
            toggle.checked = false;
            AIEngine.setEnabled(false);
          }
        }
      });
    });

    /* ── Handle sort change from toolbar ── */
    function handleSortChange(sortKey) {
      _currentSortKey = sortKey;
      if (_lastSearchResults.length > 0) {
        const sorted = SortEngine.sortResults(_lastSearchResults, sortKey);
        rerenderResults(sorted);
      }
    }

    /* ── Re-render results after sort ── */
    function rerenderResults(results) {
      if (State.searchMode === 'latex' && typeof renderLatexResults === 'function') {
        renderLatexResults(results, null);
      } else if (typeof renderTextResults === 'function') {
        renderTextResults(results, null, null);
      }
      typesetResults();
    }

    /* ── Update sort toolbar ── */
    function updateSortToolbar(count) {
      const container = document.getElementById('sortToolbarContainer');
      if (container && count > 0) {
        container.innerHTML = AIUI.renderSortToolbar(_currentSortKey, count);
      }
    }

    /* ── AI Buttons ── */
    function initAIButtons() {
      const qualityBtn = document.getElementById('aiQualityBtn');
      const suggestBtn = document.getElementById('aiSuggestBtn');
      const refreshBtn = document.getElementById('aiRefreshBtn');
      const explainBtn = document.getElementById('aiExplainBtn');
      const panelContainer = document.getElementById('aiPanelContainer');

      if (qualityBtn) {
        qualityBtn.addEventListener('click', async () => {
          if (!_lastSearchResults.length || !_lastSearchQuery) return;
          qualityBtn.classList.add('loading');
          qualityBtn.disabled = true;
          try {
            const data = await AIEngine.qualityCheck(_lastSearchResults, _lastSearchQuery);
            if (data && panelContainer) {
              panelContainer.innerHTML = AIUI.renderQualityCheck(data);
              typesetResults();
            }
          } finally {
            qualityBtn.classList.remove('loading');
            qualityBtn.disabled = false;
          }
        });
      }

      if (suggestBtn) {
        suggestBtn.addEventListener('click', async () => {
          if (!_lastSearchQuery) return;
          suggestBtn.classList.add('loading');
          suggestBtn.disabled = true;
          try {
            const data = await AIEngine.suggest(
              _lastSearchQuery,
              _lastSearchResults.length,
              State.searchMode
            );
            if (data && panelContainer) {
              panelContainer.innerHTML = AIUI.renderAISuggestions(data);
              typesetResults();
            }
          } finally {
            suggestBtn.classList.remove('loading');
            suggestBtn.disabled = false;
          }
        });
      }

      if (refreshBtn) {
        refreshBtn.addEventListener('click', async () => {
          if (!_lastSearchQuery) return;
          refreshBtn.classList.add('loading');
          refreshBtn.disabled = true;
          try {
            const titles = _lastSearchResults.map(r => r.title || '').filter(Boolean);
            const data = await AIEngine.refreshAnalysis(_lastSearchQuery, titles, State.searchMode);
            if (data && panelContainer) {
              panelContainer.innerHTML = AIUI.renderRefreshAnalysis(data);
              typesetResults();
            }
          } finally {
            refreshBtn.classList.remove('loading');
            refreshBtn.disabled = false;
          }
        });
      }

      if (explainBtn) {
        explainBtn.addEventListener('click', async () => {
          const latex = DOM.latexInput ? DOM.latexInput.value.trim() : '';
          const textQuery = DOM.query ? DOM.query.value.trim() : '';
          const formula = latex || textQuery;
          if (!formula) return;
          explainBtn.classList.add('loading');
          explainBtn.disabled = true;
          try {
            const data = await AIEngine.explainFormula(formula, _lastSearchQuery);
            if (data && panelContainer) {
              panelContainer.innerHTML = AIUI.renderFormulaExplanation(data);
              typesetResults();
            }
          } finally {
            explainBtn.classList.remove('loading');
            explainBtn.disabled = false;
          }
        });
      }
    }

    /* ── Hook: store results globally for AI and Sort ── */
    const _originalSearchText = typeof searchText === 'function' ? searchText : null;
    const _originalSearchLatex = typeof searchLatex === 'function' ? searchLatex : null;

    // Monkey-patch to capture results - done via MutationObserver on results div
    const resultsObserver = new MutationObserver(() => {
      // Count result cards to update sort toolbar
      const cards = document.querySelectorAll('.result-card, .az-result-card');
      if (cards.length > 0) {
        updateSortToolbar(cards.length);
      }
    });

    // Start observing once DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      const resultsDiv = document.getElementById('results');
      if (resultsDiv) {
        resultsObserver.observe(resultsDiv, { childList: true, subtree: true });
      }
    });
  </script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>

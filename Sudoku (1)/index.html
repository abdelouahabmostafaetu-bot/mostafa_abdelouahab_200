<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sudoku</title>
  <link href="https://api.fontshare.com/v2/css?f[]=plus-jakarta-sans@400,500,600,700&f[]=chillax@500,600,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo" viewBox="0 0 32 32" width="28" height="28" aria-label="Sudoku logo">
          <rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="11" y1="2" x2="11" y2="30" stroke="currentColor" stroke-width="1.5"/>
          <line x1="21" y1="2" x2="21" y2="30" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2" y1="11" x2="30" y2="11" stroke="currentColor" stroke-width="1.5"/>
          <line x1="2" y1="21" x2="30" y2="21" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="7" cy="7" r="1.5" fill="currentColor" opacity="0.4"/>
          <circle cx="16" cy="16" r="1.5" fill="currentColor" opacity="0.4"/>
          <circle cx="25" cy="25" r="1.5" fill="currentColor" opacity="0.4"/>
        </svg>
        <h1 class="title">Sudoku</h1>
      </div>
      <div class="header-right">
        <button data-theme-toggle aria-label="Switch theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Game Controls -->
    <div class="controls">
      <div class="difficulty-row">
        <button class="diff-btn active" data-diff="easy">Easy</button>
        <button class="diff-btn" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">00:00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Errors</span>
          <span class="stat-value" id="errors">0/3</span>
        </div>
        <button class="new-game-btn" id="newGameBtn">New Game</button>
      </div>
    </div>

    <!-- Sudoku Board -->
    <div class="board-container">
      <div class="board" id="board"></div>
    </div>

    <!-- Number Pad -->
    <div class="numpad" id="numpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="action-btn" id="undoBtn" aria-label="Undo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><polyline points="7,14 3,10 7,6"/></svg>
        <span>Undo</span>
      </button>
      <button class="action-btn" id="eraseBtn" aria-label="Erase">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4"/><line x1="14" y1="7" x2="18" y2="11"/></svg>
        <span>Erase</span>
      </button>
      <button class="action-btn" id="notesBtn" aria-label="Notes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>Notes</span>
      </button>
      <button class="action-btn" id="hintBtn" aria-label="Hint">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>
        <span>Hint</span>
      </button>
    </div>

    <!-- Win Modal -->
    <div class="modal-overlay" id="winModal">
      <div class="modal">
        <div class="modal-icon">🎉</div>
        <h2 class="modal-title">Puzzle Complete</h2>
        <p class="modal-text" id="winText">Great job!</p>
        <button class="modal-btn" id="playAgainBtn">Play Again</button>
      </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal-overlay" id="gameOverModal">
      <div class="modal">
        <div class="modal-icon">😔</div>
        <h2 class="modal-title">Game Over</h2>
        <p class="modal-text">You made 3 mistakes.</p>
        <button class="modal-btn" id="tryAgainBtn">Try Again</button>
      </div>
    </div>
  </div>

  <script src="./sudoku.js"></script>
  <script src="./app.js"></script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
